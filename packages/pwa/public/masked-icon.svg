<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="96" fill="#1e40af"/>
  <g transform="translate(256,256)">
    <!-- Truck body -->
    <rect x="-120" y="-60" width="160" height="100" rx="8" fill="white" opacity="0.95"/>
    <!-- Truck cabin -->
