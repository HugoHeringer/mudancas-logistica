    <!-- Windshield -->
    <rect x="50" y="-30" width="60" height="40" rx="4" fill="#1e40af"/>
    <!-- Wheels -->
    <circle cx="-80" cy="60" r="24" fill="white"/>
    <circle cx="-80" cy="60" r="14" fill="#1e40af"/>
    <circle cx="80" cy="60" r="24" fill="white"/>
    <circle cx="80" cy="60" r="14" fill="#1e40af"/>
  </g>
</svg>
